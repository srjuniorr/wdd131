<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Review Form | WDD 131 | Flavio Dias</title>
    <meta name="description" content="A product review form built with HTML, CSS and JavaScript for the WDD 131 Week 5 assignment.">
    <meta name="author" content="Flavio Dias">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@500;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="styles/form.css">

    <script src="scripts/form.js" defer></script>
</head>

<body>
    <header>
        <span class="site-name">Product Reviews</span>
    </header>

    <main>
        <h1>Product Review</h1>

        <form method="get" action="review.html">

            <!-- product name. my javascript adds the options here -->
            <label for="product-name">Product Name <span class="required">*</span></label>
            <select id="product-name" name="product-name" required>
                <option value="" disabled selected>Select a Product ...</option>
            </select>

            <fieldset class="rating-set">
                <legend>Overall Rating <span class="required">*</span></legend>
                <div class="rating">
                    <input type="radio" id="rating5" name="rating" value="5" required>
                    <label for="rating5" title="5 stars">&#9733;</label>

                    <input type="radio" id="rating4" name="rating" value="4" required>
                    <label for="rating4" title="4 stars">&#9733;</label>

                    <input type="radio" id="rating3" name="rating" value="3" required>
                    <label for="rating3" title="3 stars">&#9733;</label>

                    <input type="radio" id="rating2" name="rating" value="2" required>
                    <label for="rating2" title="2 stars">&#9733;</label>

                    <input type="radio" id="rating1" name="rating" value="1" required>
                    <label for="rating1" title="1 star">&#9733;</label>
                </div>
            </fieldset>

            <label for="install-date">Date of Installation <span class="required">*</span></label>
            <input type="date" id="install-date" name="install-date" required>

            <fieldset class="features-set">
                <legend>Useful Features</legend>

                <div class="checkbox-line">
                    <input type="checkbox" id="feature1" name="features" value="durability">
                    <label for="feature1">Durability</label>
                </div>
                <div class="checkbox-line">
                    <input type="checkbox" id="feature2" name="features" value="ease-of-use">
                    <label for="feature2">Ease of Use</label>
                </div>
                <div class="checkbox-line">
                    <input type="checkbox" id="feature3" name="features" value="affordability">
                    <label for="feature3">Affordability</label>
                </div>
                <div class="checkbox-line">
                    <input type="checkbox" id="feature4" name="features" value="design">
                    <label for="feature4">Design</label>
                </div>
                <div class="checkbox-line">
                    <input type="checkbox" id="feature5" name="features" value="reliability">
                    <label for="feature5">Reliability</label>
                </div>
            </fieldset>

            <label for="review-text">Written Review</label>
            <textarea id="review-text" name="review-text" rows="5"></textarea>

            <label for="user-name">User Name</label>
            <input type="text" id="user-name" name="user-name">

            <input type="submit" value="Submit Review">
        </form>
    </main>

    <footer>
        <p>&copy; <span id="currentyear"></span> | Flavio Dias | Utah, USA</p>
        <p id="lastModified"></p>
    </footer>
</body>

</html>
